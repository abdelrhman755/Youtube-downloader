<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STARK Youtube Downloader</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1 class="name">STARK</h1>
    <div class="square">
        <div class="title">
            <img src="images\white-square-bordered-youtube-logo-on-transparent-background-free-png-removebg-preview.png" alt="youtube logo" class="logo">
            <h2>Youtube Downloader</h2>
        </div>
        <input type="text" placeholder="Enter Video Link here" class="input-box" id="video-input">
        <button class="download-btn" id="download-btn" target="_blank">Download</button>
        <p id="message"></p>
        <img id="thumbnail">
        <a id="download-link" target="_blank">Open download page</a>
    </div>
<script src="script.js"></script>
</body>
</html>
